<!DOCTYPE html>

<html>
<head>
<title>Live Sports TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;text-align:center">

<h1>Live Sports TV</h1>
<p>Select a channel to watch:</p>

<select id="channelSelect">
<option value="">Select Channel</option>

<option value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">Big Buck Bunny</option>
<option value="https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8">Tears of Steel</option>
<option value="https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_adv_example_hevc/master.m3u8">Apple HLS Demo</option>
<option value="https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8">Live Test Stream</option>

</select>

<br><br>

<video id="video" width="900" height="500" controls autoplay></video>

<script>
const video = document.getElementById('video')
const select = document.getElementById('channelSelect')

select.addEventListener('change', function () {
    let stream = this.value
    if(!stream) return
    if(Hls.isSupported()) {
        let hls = new Hls()
        hls.loadSource(stream)
        hls.attachMedia(video)
    } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = stream
    }
})
</script>

</body>
</html>
